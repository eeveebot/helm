---
{{ if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "operator.serviceAccountName" . }}
  labels:
  {{- include "operator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eevee-operator-rolebinding
  labels:
  {{- include "operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eevee-operator-role
subjects:
- kind: ServiceAccount
  name: '{{ include "operator.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eevee-operator
  labels:
    eevee.io/operator: "true"
  {{- include "operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.eeveeOperator.replicas }}
  revisionHistoryLimit: {{ .Values.eeveeOperator.revisionHistoryLimit }}
  strategy:
    rollingUpdate:
      maxSurge: {{ .Values.eeveeOperator.strategy.rollingUpdate.maxSurge | quote }}
      maxUnavailable: {{ .Values.eeveeOperator.strategy.rollingUpdate.maxUnavailable
        | quote }}
    type: {{ .Values.eeveeOperator.strategy.type | quote }}
  selector:
    matchLabels:
      cdk8s.io/metadata.addr: eevee-operator-c8fa08f6
    {{- include "operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        cdk8s.io/metadata.addr: eevee-operator-c8fa08f6
      {{- include "operator.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: true
      containers:
      - env:
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.eeveeOperator.main.image.repository }}:{{ .Values.eeveeOperator.main.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.eeveeOperator.main.imagePullPolicy }}
        name: main
        ports:
        - containerPort: 9000
          name: http
          protocol: TCP
        resources: {{- toYaml .Values.eeveeOperator.main.resources | nindent 10 }}
        securityContext: {{- toYaml .Values.eeveeOperator.main.containerSecurityContext
          | nindent 10 }}
      dnsPolicy: ClusterFirst
      nodeSelector: {{- toYaml .Values.eeveeOperator.nodeSelector | nindent 8 }}
      restartPolicy: Always
      securityContext: {{- toYaml .Values.eeveeOperator.podSecurityContext | nindent 8
        }}
      serviceAccountName: {{ include "operator.serviceAccountName" . }}
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
      tolerations: {{- toYaml .Values.eeveeOperator.tolerations | nindent 8 }}
      topologySpreadConstraints: {{- toYaml .Values.eeveeOperator.topologySpreadConstraints
        | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: eevee-operator-service
  labels:
  {{- include "operator.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    cdk8s.io/metadata.addr: eevee-operator-c8fa08f6
    {{- include "operator.selectorLabels" . | nindent 4 }}
  ports:
  {{- .Values.service.ports | toYaml | nindent 2 }}
