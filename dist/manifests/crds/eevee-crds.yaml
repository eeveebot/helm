apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eevee-crd-job-role
  namespace: eevee-system
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
      - deletecollection
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eevee-crd-job-service-account
  namespace: eevee-system
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eevee-crd-job-rolebinding
  namespace: eevee-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eevee-crd-job-role
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: eevee-crd-job-service-account
    namespace: eevee-system
---
apiVersion: batch/v1
kind: Job
metadata:
  labels:
    eevee.bot/crds: "true"
  name: eevee-crd-job
  namespace: eevee-system
spec:
  template:
    metadata:
      labels:
        cdk8s.io/metadata.addr: eevee-crd-job-c8bcfaae
    spec:
      automountServiceAccountToken: true
      containers:
        - env:
            - name: KUBE_IN_CLUSTER_CONFIG
              value: "true"
          image: ghcr.io/eeveebot/crds:latest
          imagePullPolicy: Always
          name: main
          resources:
            limits:
              cpu: 1500m
              memory: 2048Mi
            requests:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
      dnsPolicy: ClusterFirst
      hostNetwork: false
      restartPolicy: Never
      securityContext:
        fsGroupChangePolicy: Always
        runAsNonRoot: true
      serviceAccountName: eevee-crd-job-service-account
      setHostnameAsFQDN: false
      shareProcessNamespace: false
      terminationGracePeriodSeconds: 30
  ttlSecondsAfterFinished: 600
