{{- if .Values.router.enabled }}
---
apiVersion: eevee.bot/v1
kind: router
metadata:
  name: {{ include "eevee-bot.fullname" $ }}-router
  namespace: {{ include "eevee-bot.botNamespace" $ }}
  labels:
    {{- include "eevee-bot.labels" . | nindent 4 }}
spec:
  {{- toYaml .Values.router.spec | nindent 2 }}
{{- end }}
