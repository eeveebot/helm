{{- if .Values.chatConnectionIrc.enabled }}
---
apiVersion: eevee.bot/v1
kind: chatconnectionirc
metadata:
  name: {{ include "eevee-bot.fullname" $ }}-irc
  namespace: {{ include "eevee-bot.botNamespace" $ }}
  labels:
    {{- include "eevee-bot.labels" . | nindent 4 }}
spec:
  {{- toYaml .Values.chatConnectionIrc.spec | nindent 2 }}
{{- end }}
